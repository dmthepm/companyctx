# Dependabot config — see docs/OSS-HYGIENE.md (Automated gates).
#
# Weekly sweep. Minor/patch updates grouped into one PR per ecosystem so
# the queue stays reviewable; major updates surface individually because
# they can break downstream behavior and deserve human judgment.
version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Los_Angeles
    target-branch: main
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - infra
    commit-message:
      prefix: chore
      include: scope
    groups:
      python-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Los_Angeles
    target-branch: main
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - infra
    commit-message:
      prefix: chore
      include: scope
    groups:
      actions-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
